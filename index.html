						<div class="bar">

										><span class="legend-dot single"></span
										>граф</span
									>
									<span class="legend-item"
										><span class="legend-dot digraph"></span
										>диграф</span
									>
								</div>
							</div>
							<button id="copy-btn" onclick="onCopy()">
								Копировать
							</button>
						</div>
					</div>
				</div>

			</div>
